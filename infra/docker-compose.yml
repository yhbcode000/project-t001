services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hello_platform
    ports: ['5432:5432']
    volumes: ['postgres-data:/var/lib/postgresql/data']

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ['9000:9000', '9001:9001']
    volumes: ['minio-data:/data']

  livekit:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0
    ports: ['7880:7880', '7881:7881', '50000-50100:50000-50100/udp']

  prometheus:
    image: prom/prometheus:latest
    ports: ['9090:9090']
    volumes: ['./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro']

  grafana:
    image: grafana/grafana:latest
    ports: ['3001:3000']
    volumes: ['./grafana/provisioning:/etc/grafana/provisioning:ro']

volumes:
  postgres-data:
  minio-data:
